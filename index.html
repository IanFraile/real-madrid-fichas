<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            box-shadow: 3px 3px 3px black;
        }
        #contenedor {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background-color: purple;
        }
        #contenedor div {
            background-color: white;
            padding: 20px;
            text-align: center;
        }
        img {
            width: 200px;
        }

        table#tabla-jugadores,td, th{
            border: 2px solid purple;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Jugadores del Real Madrid</h1>
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A151339248&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/rizki-hidayat-8" title="Rizki Hidayat 7" target="_blank" style="color: #cccccc; text-decoration: none;">Rizki Hidayat 7</a> · <a href="https://soundcloud.com/rizki-hidayat-8/hala-madrid-y-nada-m-s-la" title="Hala Madrid y Nada Más - La canción de la Décima.mp3" target="_blank" style="color: #cccccc; text-decoration: none;">Hala Madrid y Nada Más - La canción de la Décima.mp3</a></div>
    <div id="contenedor">

    </div>
    <table id="tabla-jugadores">

    </table>
    <script>
        let jugadores = [
            {
                nombre:"Mbappe",
                edad: 28,
                ficha: 200000000,
                foto: "mbappe.jpg"
            },
            {
                nombre:"Raúl",
                edad: 48,
                ficha: 25000000,
                foto: "raul.jpg"
            },
            {
                nombre:"Butragueño",
                edad: 40,
                ficha:5000000,
                foto: "butra.jpg"
            },
            {
                nombre:"Zidane",
                edad: 42,
                ficha: 3000000,
                foto: "zidane.jpg"
            }
        ]
        for ( let i=0;i<jugadores.length;i++){
            //jugador = jugadores[i];
            fotoJugador = jugadores[i].foto;
            nombreJugador = jugadores[i].nombre;
            edadJugador = jugadores[i].edad;
            fichaJugador = jugadores[i].ficha;
            nuevaCaja = document.createElement("div");
            nuevoH1=document.createElement("h1");
            nuevoH1.innerHTML = nombreJugador;
            nuevaCaja.appendChild(nuevoH1);

            //Creo un h2 para contener la edad
            nuevoH2=document.createElement("h2");
            nuevoH2.innerHTML = "Edad "+ edadJugador;
            nuevaCaja.appendChild(nuevoH2);

            //Creo un h3 para contener la ficha
            nuevoH3=document.createElement("h3");
            nuevoH3.innerHTML = "Ficha "+ fichaJugador;
            nuevaCaja.appendChild(nuevoH3);

            //Creo una nueva imagen para poner la foto
            nuevaFoto = document.createElement("img");
            nuevaFoto.src = fotoJugador;
            nuevaCaja.appendChild(nuevaFoto);

            //Finalmente agregamos la caja al contenedor
            document.getElementById("contenedor").appendChild(nuevaCaja);
        }

        //Creación de la tabla de jugadores
        //LE AÑADO LAS CABECERAS A LA TABLA
        let nuevoTRcabecera = document.createElement("tr");
        let cabeceraNombre = document.createElement("th");
        let cabeceraEdad = document.createElement("th");
        let cabeceraFicha = document.createElement("th");
        let cabeceraFoto = document.createElement("th");
        cabeceraNombre.innerHTML="Nombre";
        nuevoTRcabecera.appendChild(cabeceraNombre);

        cabeceraEdad.innerHTML="Edad";
        nuevoTRcabecera.appendChild(cabeceraEdad);

        cabeceraFicha.innerHTML="Ficha";
        nuevoTRcabecera.appendChild(cabeceraFicha);

        cabeceraFoto.innerHTML="Foto";
        nuevoTRcabecera.appendChild(cabeceraFoto);
        //Añado la fila a la tabla
        document.getElementById("tabla-jugadores").appendChild(nuevoTRcabecera);

        //recorro todos los jugadores y crea una fila para cada uno
        for ( let jugador of jugadores ){
            let nuevoTR = document.createElement("tr");
            let tdNombre = document.createElement("td");
            let tdEdad = document.createElement("td");
            let tdFicha = document.createElement("td");

            //Hago un td para el nombre y lo agrego al tr
            tdNombre.innerHTML = jugador.nombre;
            nuevoTR.appendChild(tdNombre);

            //Hago un td para la edad y lo agrago al tr
            tdEdad.innerHTML = jugador.edad;
            nuevoTR.appendChild(tdEdad);

            //Hago un td para la ficha y lo agrago al tr
            tdFicha.innerHTML = jugador.ficha;
            nuevoTR.appendChild(tdFicha);

            //añado la imagen
            let tdFoto = document.createElement("td");
            let nuevaFoto = document.createElement("img");
            nuevaFoto.src = jugador.foto
            tdFoto.appendChild(nuevaFoto);
            nuevoTR.appendChild(tdFoto);

            //Añado el tr a la tabla
            document.getElementById("tabla-jugadores").appendChild(nuevoTR);
        }
    </script>
</body>
</html>
